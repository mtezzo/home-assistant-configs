blueprint:
  name: Inovelli Red Dimmer ↔ Philips Hue Zone Sync
  description: >
    Bidirectional sync between an Inovelli Red Series Z-Wave dimmer and a
    Philips Hue zone (or group).  Changes from the physical switch, Hue app,
    Home Assistant UI, or HomeKit are all reflected on both the switch LED bar
    and the Hue zone.

    **Requirements**
      - Z-Wave JS integration (with the Inovelli Red dimmer paired)
      - Philips Hue integration
      - The Inovelli switch must expose a `light` entity (used for LED bar sync)
        **and** fire `zwave_js_value_notification` events for scene/button presses.

    **How it works**
      1. Physical paddle press / hold → controls the Hue zone, then syncs the
         LED bar to the resulting brightness.
      2. Any external change to the Hue zone (Hue app, HA UI, HomeKit) →
         syncs the LED bar and, optionally, keeps the switch virtual level in
         step.

    **LED bar notes**
      The Inovelli Red uses parameter 13 (LED strip colour) and parameter 14
      (LED strip intensity) for the *always-on* indicator behaviour.
      This blueprint writes those parameters via `zwave_js.set_config_parameter`
      to keep the bar in sync without interfering with the switch's normal
      Z-Wave level (which is intentionally left alone so the switch doesn't
      try to directly control anything).

  domain: automation
  author: Claude / Anthropic
  homeassistant:
    min_version: "2024.1.0"

  input:
    inovelli_switch:
      name: Inovelli Red Dimmer (switch entity)
      description: >
        The `light` entity for the Inovelli Red dimmer.  Used to read button
        events and to update the LED bar.
      selector:
        entity:
          domain: light

    inovelli_node_id:
      name: Inovelli Z-Wave Node ID
      description: >
        The Z-Wave node ID of the Inovelli dimmer (visible in Z-Wave JS
        developer tools).  Required to set LED bar config parameters.
      selector:
        number:
          min: 1
          max: 232
          mode: box

    hue_zone:
      name: Philips Hue Zone / Group
      description: >
        The `light` entity representing the Hue zone or group to control.
      selector:
        entity:
          domain: light

    transition_time:
      name: Transition time (seconds)
      description: Fade duration sent to the Hue zone on dim commands.
      default: 1
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
          unit_of_measurement: s
          mode: slider

    hold_step:
      name: Hold brightness step (%)
      description: >
        How much to increase / decrease brightness per second while the paddle
        is held.
      default: 10
      selector:
        number:
          min: 1
          max: 30
          unit_of_measurement: "%"
          mode: slider

    led_color:
      name: LED bar colour (on state)
      description: >
        Hue (0–255) for the Inovelli LED bar when the zone is on.
        0 = red, 85 = green, 170 = blue, 255 = white.
      default: 170
      selector:
        number:
          min: 0
          max: 255
          mode: slider

    led_color_off:
      name: LED bar colour (off state)
      description: Hue for the LED bar when the zone is off.
      default: 170
      selector:
        number:
          min: 0
          max: 255
          mode: slider

    led_intensity_off:
      name: LED bar intensity when zone is off (%)
      description: >
        0 = completely dark, 10 = dim night-light glow.  Set to 0 to turn the
        bar fully off when lights are off.
      default: 10
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: slider

# ---------------------------------------------------------------------------
# Mode: queued keeps hold-dimming loops from stacking up
# ---------------------------------------------------------------------------
mode: queued
max: 10

# ---------------------------------------------------------------------------
# Variables – resolved once at trigger time
# ---------------------------------------------------------------------------
variables:
  inovelli_switch: !input inovelli_switch
  inovelli_node_id: !input inovelli_node_id
  hue_zone: !input hue_zone
  transition_time: !input transition_time
  hold_step: !input hold_step
  led_color: !input led_color
  led_color_off: !input led_color_off
  led_intensity_off: !input led_intensity_off

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
trigger:
  # ── Physical paddle events (Z-Wave JS scene notifications) ──────────────

  # Upper paddle tap → turn on
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      node_id: !input inovelli_node_id
      command_class_name: Central Scene
      property_key_name: "001"   # button 1 = upper paddle
      value: KeyPressed
    id: upper_tap

  # Upper paddle double-tap → full brightness
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      node_id: !input inovelli_node_id
      command_class_name: Central Scene
      property_key_name: "001"
      value: KeyPressed2x
    id: upper_double

  # Upper paddle hold → start brightening
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      node_id: !input inovelli_node_id
      command_class_name: Central Scene
      property_key_name: "001"
      value: KeyHeldDown
    id: upper_hold

  # Upper paddle release
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      node_id: !input inovelli_node_id
      command_class_name: Central Scene
      property_key_name: "001"
      value: KeyReleased
    id: upper_release

  # Lower paddle tap → turn off
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      node_id: !input inovelli_node_id
      command_class_name: Central Scene
      property_key_name: "002"   # button 2 = lower paddle
      value: KeyPressed
    id: lower_tap

  # Lower paddle double-tap → minimum brightness (1 %)
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      node_id: !input inovelli_node_id
      command_class_name: Central Scene
      property_key_name: "002"
      value: KeyPressed2x
    id: lower_double

  # Lower paddle hold → start dimming
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      node_id: !input inovelli_node_id
      command_class_name: Central Scene
      property_key_name: "002"
      value: KeyHeldDown
    id: lower_hold

  # Lower paddle release
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      node_id: !input inovelli_node_id
      command_class_name: Central Scene
      property_key_name: "002"
      value: KeyReleased
    id: lower_release

  # ── External changes to the Hue zone ────────────────────────────────────
  - platform: state
    entity_id: !input hue_zone
    id: hue_changed
    # Avoid infinite loops – only react to real state changes
    to:
      - "on"
      - "off"

# ---------------------------------------------------------------------------
# Actions
# ---------------------------------------------------------------------------
action:
  - choose:

      # ────────────────────────────────────────────────────────────────────
      # UPPER TAP → turn Hue zone on (last brightness)
      # ────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: upper_tap
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input hue_zone
            data:
              transition: !input transition_time
          - delay:
              milliseconds: 600
          - alias: Sync LED bar after upper tap
            call_service: script.inovelli_hue_sync_led
            data:
              node_id: !input inovelli_node_id
              hue_zone: !input hue_zone
              led_color: !input led_color
              led_color_off: !input led_color_off
              led_intensity_off: !input led_intensity_off

      # ────────────────────────────────────────────────────────────────────
      # UPPER DOUBLE-TAP → full brightness
      # ────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: upper_double
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input hue_zone
            data:
              brightness_pct: 100
              transition: !input transition_time
          - delay:
              milliseconds: 600
          - call_service: script.inovelli_hue_sync_led
            data:
              node_id: !input inovelli_node_id
              hue_zone: !input hue_zone
              led_color: !input led_color
              led_color_off: !input led_color_off
              led_intensity_off: !input led_intensity_off

      # ────────────────────────────────────────────────────────────────────
      # UPPER HOLD → brighten in a loop until released
      # ────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: upper_hold
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: >
                    {{ states(inovelli_switch) != 'unavailable' }}
              sequence:
                - variables:
                    current_bri: >
                      {{ state_attr(hue_zone, 'brightness') | default(0) | int }}
                    new_bri: >
                      {{ [current_bri + (hold_step / 100 * 255) | int, 255] | min }}
                - service: light.turn_on
                  target:
                    entity_id: !input hue_zone
                  data:
                    brightness: "{{ new_bri }}"
                    transition: 0.5
                - call_service: script.inovelli_hue_sync_led
                  data:
                    node_id: !input inovelli_node_id
                    hue_zone: !input hue_zone
                    led_color: !input led_color
                    led_color_off: !input led_color_off
                    led_intensity_off: !input led_intensity_off
                - wait_for_trigger:
                    - platform: event
                      event_type: zwave_js_value_notification
                      event_data:
                        node_id: !input inovelli_node_id
                        command_class_name: Central Scene
                        property_key_name: "001"
                        value: KeyReleased
                  timeout:
                    milliseconds: 600
                  continue_on_timeout: true
                - condition: template
                  value_template: "{{ wait.trigger is not none }}"
              # break out of loop when KeyReleased fires

      # ────────────────────────────────────────────────────────────────────
      # LOWER TAP → turn off
      # ────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: lower_tap
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input hue_zone
            data:
              transition: !input transition_time
          - delay:
              milliseconds: 600
          - call_service: script.inovelli_hue_sync_led
            data:
              node_id: !input inovelli_node_id
              hue_zone: !input hue_zone
              led_color: !input led_color
              led_color_off: !input led_color_off
              led_intensity_off: !input led_intensity_off

      # ────────────────────────────────────────────────────────────────────
      # LOWER DOUBLE-TAP → minimum brightness (1 %)
      # ────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: lower_double
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input hue_zone
            data:
              brightness_pct: 1
              transition: !input transition_time
          - delay:
              milliseconds: 600
          - call_service: script.inovelli_hue_sync_led
            data:
              node_id: !input inovelli_node_id
              hue_zone: !input hue_zone
              led_color: !input led_color
              led_color_off: !input led_color_off
              led_intensity_off: !input led_intensity_off

      # ────────────────────────────────────────────────────────────────────
      # LOWER HOLD → dim in a loop until released
      # ────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: lower_hold
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: >
                    {{ states(inovelli_switch) != 'unavailable' }}
              sequence:
                - variables:
                    current_bri: >
                      {{ state_attr(hue_zone, 'brightness') | default(255) | int }}
                    new_bri: >
                      {{ [current_bri - (hold_step / 100 * 255) | int, 1] | max }}
                - service: light.turn_on
                  target:
                    entity_id: !input hue_zone
                  data:
                    brightness: "{{ new_bri }}"
                    transition: 0.5
                - call_service: script.inovelli_hue_sync_led
                  data:
                    node_id: !input inovelli_node_id
                    hue_zone: !input hue_zone
                    led_color: !input led_color
                    led_color_off: !input led_color_off
                    led_intensity_off: !input led_intensity_off
                - wait_for_trigger:
                    - platform: event
                      event_type: zwave_js_value_notification
                      event_data:
                        node_id: !input inovelli_node_id
                        command_class_name: Central Scene
                        property_key_name: "002"
                        value: KeyReleased
                  timeout:
                    milliseconds: 600
                  continue_on_timeout: true
                - condition: template
                  value_template: "{{ wait.trigger is not none }}"

      # ────────────────────────────────────────────────────────────────────
      # HUE ZONE CHANGED (external – Hue app / HA UI / HomeKit)
      # ────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: hue_changed
        sequence:
          # Small delay to let Hue state fully settle
          - delay:
              milliseconds: 500
          - call_service: script.inovelli_hue_sync_led
            data:
              node_id: !input inovelli_node_id
              hue_zone: !input hue_zone
              led_color: !input led_color
              led_color_off: !input led_color_off
              led_intensity_off: !input led_intensity_off

# ---------------------------------------------------------------------------
# Companion script – inovelli_hue_sync_led
#
# Add this script to your scripts.yaml (or via the Scripts UI) ONCE.
# All blueprint automations share it.
#
# Parameters accepted via 'data':
#   node_id         – Z-Wave node ID (integer)
#   hue_zone        – entity_id of the Hue zone
#   led_color       – LED hue when on  (0-255)
#   led_color_off   – LED hue when off (0-255)
#   led_intensity_off – LED intensity when off (0-100)
# ---------------------------------------------------------------------------
#
# ── scripts.yaml entry ────────────────────────────────────────────────────
#
# inovelli_hue_sync_led:
#   alias: "Inovelli – Sync LED bar to Hue zone"
#   mode: restart
#   fields:
#     node_id:
#       description: Z-Wave node ID
#       example: 12
#     hue_zone:
#       description: Hue zone entity_id
#       example: light.living_room
#     led_color:
#       description: LED hue when on (0-255)
#       example: 170
#     led_color_off:
#       description: LED hue when off (0-255)
#       example: 170
#     led_intensity_off:
#       description: LED intensity when off (0-100)
#       example: 10
#   sequence:
#     - variables:
#         is_on: "{{ states(hue_zone) == 'on' }}"
#         bri_pct: >
#           {% if is_on %}
#             {{ ((state_attr(hue_zone, 'brightness') | default(255) | int) / 255 * 100) | round(0) | int }}
#           {% else %}
#             0
#           {% endif %}
#         param_color:  "{{ led_color if is_on else led_color_off }}"
#         param_intensity: "{{ bri_pct if is_on else led_intensity_off }}"
#
#     # Parameter 13 – LED indicator colour
#     - service: zwave_js.set_config_parameter
#       data:
#         node_id: "{{ node_id }}"
#         parameter: 13
#         value: "{{ param_color }}"
#
#     # Parameter 14 – LED indicator intensity (active / always-on level)
#     - service: zwave_js.set_config_parameter
#       data:
#         node_id: "{{ node_id }}"
#         parameter: 14
#         value: "{{ param_intensity }}"
